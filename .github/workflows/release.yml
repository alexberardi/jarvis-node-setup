name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.2.0-rc1)'
        required: true
      release:
        description: 'Create a GitHub release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            docker_image: python:3.13-slim

    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Checkout jarvis-command-sdk
        uses: actions/checkout@v4
        with:
          repository: alexberardi/jarvis-command-sdk
          path: jarvis-command-sdk

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build tarball in emulated container
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}/output:/output" \
            ${{ matrix.docker_image }} \
            bash /src/build/build-tarball.sh \
              "${{ steps.version.outputs.version }}" \
              "${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-node-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: output/jarvis-node-*.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"/*.tar.gz release/
          done
          cp install.sh release/

          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
          body: |
            ## Install

            **One-liner (recommended):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sudo bash
            ```

            **Manual download:**
            | Platform | Tarball |
            |----------|---------|
            | Pi Zero 2W / Pi 3 / Pi 4 / Pi 5 (arm64) | `jarvis-node-${{ steps.version.outputs.version }}-arm64.tar.gz` |

            After downloading:
            ```bash
            sudo tar xzf jarvis-node-*.tar.gz -C /
            sudo /opt/jarvis-node/install.sh --local
            ```
