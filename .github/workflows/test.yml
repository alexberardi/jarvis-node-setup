name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio
        pip install httpx pydantic fastapi uvicorn cryptography python-dotenv
        pip install sqlalchemy  # For command repositories
        # Install jarvis client libraries from sibling repos
        pip install git+https://github.com/alexberardi/jarvis-log-client.git || echo "jarvis-log-client not available, will use mocks"
        pip install git+https://github.com/alexberardi/jarvis-command-sdk.git || echo "jarvis-command-sdk not available"

    - name: Run provisioning tests
      # Provisioning tests - other tests require pysqlcipher3 (encrypted SQLite)
      # which needs native compilation and is Pi-specific
      run: |
        pytest tests/test_provisioning/ -v --tb=short \
          --ignore=tests/test_provisioning/test_hostapd_wifi_manager.py \
          --ignore=tests/test_provisioning/test_wifi_manager.py

    - name: Run integration tests
      # Integration tests use mocks - no external dependencies required
      # HA command tests moved to jarvis-home-assistant-integration repo
      run: |
        pytest tests/integration/test_timer_commands.py \
               -v --tb=short
